<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mk-parser — Live Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --accent:    #58a6ff;
    --accent2:   #3fb950;
    --warn:      #d29922;
    --text:      #c9d1d9;
    --muted:     #8b949e;
    --tag-doc:   #388bfd22;
    --tag-block: #3fb95022;
    --tag-inline:#f7851422;
    --tag-text:  #8b949e22;
    --font-mono: 'Cascadia Code', 'Fira Code', 'SF Mono', Menlo, monospace;
    --radius:    8px;
  }

  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
         font-size: 14px; line-height: 1.6; height: 100dvh; display: flex; flex-direction: column; }

  header { padding: 12px 20px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; color: #e6edf3; }
  header span { color: var(--muted); font-size: 12px; }
  .badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 700;
           padding: 2px 6px; border-radius: 20px; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
  .panel  { display: flex; flex-direction: column; min-height: 0; }
  .panel + .panel { border-left: 1px solid var(--border); }

  .panel-header { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .panel-header label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;
                        letter-spacing: .05em; flex: 1; }

  .controls { display: flex; gap: 6px; align-items: center; }
  button { background: var(--surface2); color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
           transition: background .15s; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { opacity: .9; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  select { background: var(--surface2); color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }

  #editor { flex: 1; background: var(--bg); color: var(--text); border: none; outline: none;
            padding: 14px; font-family: var(--font-mono); font-size: 13px; resize: none;
            line-height: 1.7; tab-size: 4; }

  .right-panel { display: flex; flex-direction: column; min-height: 0; }

  /* Tab bar */
  .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
          background: var(--surface); }
  .tab  { padding: 8px 16px; font-size: 12px; font-weight: 500; color: var(--muted);
          cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s; }
  .tab:hover  { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content      { display: none; flex: 1; overflow: auto; min-height: 0; }
  .tab-content.show { display: flex; flex-direction: column; }

  /* Event stream */
  #event-stream { flex: 1; padding: 10px; font-family: var(--font-mono); font-size: 12px;
                  overflow-y: auto; }
  .ev { display: flex; gap: 8px; align-items: baseline; padding: 2px 0; border-bottom: 1px solid #ffffff08; }
  .ev.selected { background: #58a6ff22; }
  .ev-idx  { color: var(--muted); min-width: 32px; text-align: right; font-size: 11px; }
  .ev-kind { min-width: 60px; font-weight: 600; font-size: 11px; }
  .ev-kind.open   { color: var(--accent2); }
  .ev-kind.close  { color: #f7851a; }
  .ev-kind.text   { color: var(--accent); }
  .ev-kind.modify { color: var(--warn); }
  .ev-type { color: var(--text); }
  .ev-attr { color: var(--muted); font-size: 11px; white-space: pre-wrap; word-break: break-all; }

  /* AST tree */
  #ast-tree { flex: 1; padding: 10px; font-family: var(--font-mono); font-size: 12px;
              overflow-y: auto; }
  .tree-node { padding-left: 20px; }
  .tree-node-label { display: flex; gap: 6px; align-items: baseline;
                     padding: 1px 4px; border-radius: 4px; cursor: default; }
  .tree-node-label:hover { background: var(--surface2); }
  .tree-node-label.selected { background: #58a6ff22; }
  .tn-type  { font-weight: 600; }
  .tn-text  { color: var(--muted); font-size: 11px; max-width: 260px;
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tn-attr  { color: #58a6ff88; font-size: 11px; }
  /* node kind colors */
  .k-document   { color: #e6edf3; }
  .k-heading    { color: #d2a8ff; }
  .k-paragraph  { color: var(--accent2); }
  .k-code_block { color: var(--warn); }
  .k-list,.k-list_item { color: #79c0ff; }
  .k-table,.k-table_head,.k-table_row,.k-table_cell { color: #56d364; }
  .k-link,.k-image,.k-auto_link { color: #ffa657; }
  .k-emphasis,.k-strong,.k-strikethrough { color: #ff7b72; }
  .k-inline_code { color: var(--warn); }
  .k-text { color: var(--muted); }
  .k-soft_break,.k-hard_break { color: #30363d; }

  /* Preview pane */
  #preview { flex: 1; padding: 16px 20px; overflow-y: auto; line-height: 1.7;
             font-family: system-ui, sans-serif; }
  #preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6
             { margin: .8em 0 .4em; color: #e6edf3; }
  #preview h1 { font-size: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  #preview h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: .2em; }
  #preview p  { margin: .6em 0; }
  #preview a  { color: var(--accent); }
  #preview code { background: var(--surface2); padding: .1em .4em; border-radius: 4px;
                  font-family: var(--font-mono); font-size: .88em; }
  #preview pre  { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
                  padding: 14px; overflow-x: auto; margin: .8em 0; }
  #preview pre code { background: none; padding: 0; }
  #preview blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted);
                         margin: .6em 0; }
  #preview ul,#preview ol { padding-left: 20px; margin: .4em 0; }
  #preview li { margin: .2em 0; }
  #preview table { border-collapse: collapse; width: 100%; margin: .6em 0; }
  #preview th,#preview td { border: 1px solid var(--border); padding: 6px 12px; }
  #preview th { background: var(--surface2); }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  #preview input[type=checkbox] { margin-right: 6px; }
  #preview del { color: var(--muted); }

  /* Stream animation */
  .stream-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent);
                   vertical-align: text-bottom; animation: blink .9s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .stats-bar { padding: 4px 14px; background: var(--surface); border-top: 1px solid var(--border);
               font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-shrink: 0; }
  .stat span { color: var(--accent); font-weight: 600; }

  /* Speed slider */
  input[type=range] { accent-color: var(--accent); width: 80px; }

  .model-config { border-bottom: 1px solid var(--border); background: var(--surface); padding: 10px 14px;
                  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .model-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  .model-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .model-field > span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .model-field.full { grid-column: 1 / -1; }
  .model-field.hidden { display: none; }
  .model-field input,
  .model-field textarea,
  .model-field select {
    width: 100%;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  #model-prompt { min-height: 64px; resize: vertical; line-height: 1.45; }
  .model-actions { display: flex; align-items: center; gap: 8px; }
  .model-status { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden;
                  text-overflow: ellipsis; }
  .model-status.error { color: #ff7b72; }
  .range-active {
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 2px #58a6ff22;
  }
  .diff-output {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: pre-wrap;
    min-height: 52px;
  }
  .diff-output.error { color: #ff7b72; }
  .compare-view { display: none; flex: 1; min-height: 0; gap: 0; }
  .compare-view.show { display: grid; grid-template-columns: 1fr 1fr; }
  .compare-pane { display: flex; flex-direction: column; min-height: 0; }
  .compare-pane + .compare-pane { border-left: 1px solid var(--border); }
  .compare-pane-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  .compare-pane-body {
    flex: 1;
    overflow: auto;
    padding: 12px 14px;
    line-height: 1.7;
  }
  .compare-pane-metrics {
    border-top: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    font-family: var(--font-mono);
  }

  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .panel + .panel { border-left: 0; border-top: 1px solid var(--border); }
    .compare-view.show { grid-template-columns: 1fr; }
    .compare-pane + .compare-pane { border-left: 0; border-top: 1px solid var(--border); }
  }
  @media (max-width: 760px) {
    .model-grid { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; row-gap: 8px; }
    header > div { width: 100%; justify-content: flex-start; }
  }
</style>
</head>

<header>

> **All 25 node types** exercised in one document.
> Watch Events and AST update as each block is parsed.

---

## ① HEADING — all six ATX levels

# H1  level=1
## H2  level=2
### H3  level=3
#### H4  level=4
##### H5  level=5

## ② PARAGRAPH + TEXT

This is a **PARAGRAPH** containing plain **TEXT** nodes.
Every run of ordinary characters becomes a TEXT node inside the paragraph.

A blank line above opens a fresh PARAGRAPH block.

---

## ③ SOFT_BREAK — single newline within paragraph

Line one of this paragraph.
Line two — the bare newline becomes a SOFT_BREAK node.
Line three — another SOFT_BREAK between lines two and three.

---

## ④ HARD_BREAK — two trailing spaces before newline

This line ends with two spaces
A HARD_BREAK was emitted; this line follows it.
Another line with two trailing spaces
And its hard-break continuation.

---

## ⑤ EMPHASIS  ·  STRONG  ·  STRIKETHROUGH

*Single asterisk — EMPHASIS*
_Single underscore — EMPHASIS_
**Double asterisk — STRONG**
__Double underscore — STRONG__
***Triple asterisk — STRONG + EMPHASIS nested***
~~Two tildes — STRIKETHROUGH~~
Normal text with ~~struck words~~ inline.
Combined: **bold and *italic* inside strong**.

Call \`mk_feed(parser, data, len)\` to push bytes.
Double-backtick span: \`\` \`escape me\` \` \`\` preserves the literal backtick.

[Relative link](./docs/ARCHITECTURE.md)

![Small badge](https://via.placeholder.com/80x20/161b22/3fb950?text=C11 "Pure C11")
![No title](https://via.placeholder.com/60x20/21262d/d29922?text=WASM)

## ⑪ CODE_BLOCK — fenced with language

\`\`\`c
/* C11 — hot-path feed loop */
int mk_block_feed(MkBlockParser *bp, const char *data, size_t len) {
    for (size_t i = 0; i < len; i++) {
        char c = data[i];
        if (c == '\\r') continue;
        if (c == '\\n') { process_line(bp, bp->line_buf, bp->line_len); bp->line_len = 0; }
        else if (bp->line_len < MK_BLOCK_LINE_MAX - 1) bp->line_buf[bp->line_len++] = c;
    }
    return 0;
}

  streaming: `# AI Streaming Simulation

This demo feeds text character-by-character to simulate an LLM token stream.

Press **▶ Stream** and watch the Events, AST, and Preview panels update live.

\`\`\`python
import anthropic

client = anthropic.Anthropic()
with client.messages.stream(
    model="claude-opus-4-6",
    max_tokens=1024,
    messages=[{"role": "user", "content": "Hello"}]
) as stream:
    for text in stream.text_stream:
        parser.feed(text)

parser.finish()
\`\`\`

The parser emits events **incrementally** — headings, paragraphs, and code blocks
are opened and closed as soon as enough tokens arrive.

## How it works

1. Each \`mk_feed()\` call may be as small as **1 byte**
2. The block parser buffers incomplete lines in \`line_buf\`
3. Once a full line arrives it is dispatched to \`process_line()\`
4. Completed blocks fire callbacks immediately — no full-document buffering

> The key insight: a *heading* is certain the moment its trailing newline
> arrives. A *paragraph* is certain when a blank line follows. A *table*
> is promoted via a **MODIFY** event when the separator row arrives.

function readWebModelConfig() {
  const maxTokens = parseInt(maxTokensInput.value, 10);

  const faultProbability = parseInt(faultProbInput.value, 10);
  const fuzzRuns = parseInt(fuzzRunsInput.value, 10);
  const fuzzChunkMin = parseInt(fuzzChunkMinInput.value, 10);
  const fuzzChunkMax = parseInt(fuzzChunkMaxInput.value, 10);
  const fuzzDelayMax = parseInt(fuzzDelayMaxInput.value, 10);
  return {
    provider: providerSelect.value,
    baseUrl: baseUrlInput.value.trim() || DEFAULT_WEB_MODEL_CONFIG.baseUrl,
    apiKey: apiKeyInput.value.trim(),
    model: modelInput.value.trim() || DEFAULT_WEB_MODEL_CONFIG.model,
    maxTokens: Number.isFinite(maxTokens) ? Math.max(1, Math.min(8192, maxTokens)) : DEFAULT_WEB_MODEL_CONFIG.maxTokens,
    systemPrompt: systemPromptInput.value.trim(),
    prompt: modelPromptInput.value.trim() || DEFAULT_WEB_MODEL_CONFIG.prompt,
    faultMode: faultModeInput.value || DEFAULT_WEB_MODEL_CONFIG.faultMode,
    faultAfter: Number.isFinite(faultAfter) ? Math.max(1, faultAfter) : DEFAULT_WEB_MODEL_CONFIG.faultAfter,
    faultProbability: Number.isFinite(faultProbability)
      ? Math.max(0, Math.min(100, faultProbability))
      : DEFAULT_WEB_MODEL_CONFIG.faultProbability,
    fuzzRuns: Number.isFinite(fuzzRuns) ? Math.max(1, Math.min(200, fuzzRuns)) : DEFAULT_WEB_MODEL_CONFIG.fuzzRuns,
    fuzzChunkMin: Number.isFinite(fuzzChunkMin) ? Math.max(1, Math.min(128, fuzzChunkMin)) : DEFAULT_WEB_MODEL_CONFIG.fuzzChunkMin,
    fuzzChunkMax: Number.isFinite(fuzzChunkMax) ? Math.max(1, Math.min(256, fuzzChunkMax)) : DEFAULT_WEB_MODEL_CONFIG.fuzzChunkMax,
    fuzzDelayMax: Number.isFinite(fuzzDelayMax) ? Math.max(0, Math.min(200, fuzzDelayMax)) : DEFAULT_WEB_MODEL_CONFIG.fuzzDelayMax,
    compareSyncScroll: compareSyncInput.value || DEFAULT_WEB_MODEL_CONFIG.compareSyncScroll,
  };
}

function persistWebModelConfig() {
  const cfg = readWebModelConfig();
  const cfgB = readWebModelBConfig(cfg);
  // Avoid persisting API keys to localStorage.
  const { apiKey, ...safeCfg } = cfg;
  const { apiKey: apiKeyB, ...safeCfgB } = cfgB;
  localStorage.setItem(WEB_MODEL_STORAGE_KEY, JSON.stringify({
    ...safeCfg,
    compareB: safeCfgB,
  }));
}

function loadWebModelConfig() {
  try {
    const raw = localStorage.getItem(WEB_MODEL_STORAGE_KEY);
    if (!raw) {
      writeWebModelConfig(DEFAULT_WEB_MODEL_CONFIG);
      updateProviderFields();
      return;
    }
    const parsed = JSON.parse(raw);
    writeWebModelConfig({
      ...DEFAULT_WEB_MODEL_CONFIG,
      ...parsed,
      apiKey: '',
    });
    writeWebModelBConfig({
      ...DEFAULT_WEB_MODEL_CONFIG.compareB,
      ...(parsed.compareB || {}),
      apiKey: '',
    });
  } catch {
    writeWebModelConfig(DEFAULT_WEB_MODEL_CONFIG);
    writeWebModelBConfig(DEFAULT_WEB_MODEL_CONFIG.compareB);
  }
  updateProviderFields();
}

function syncCompareScroll(srcEl, dstEl) {
  if (compareSyncInput.value !== 'on') return;
  if (compareSyncLock) return;
  compareSyncLock = true;
  const maxSrc = Math.max(1, srcEl.scrollHeight - srcEl.clientHeight);
  const ratio = srcEl.scrollTop / maxSrc;
  const maxDst = Math.max(0, dstEl.scrollHeight - dstEl.clientHeight);
  dstEl.scrollTop = ratio * maxDst;
  compareSyncLock = false;
}

function scrollEditorToOffset(offset) {
  const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 20;
  const before = editor.value.slice(0, Math.max(0, offset));
  const line = before.split('\n').length - 1;
  editor.scrollTop = Math.max(0, (line - 2) * lineHeight);
}

function highlightSourceRange(start, end) {
  const s = Math.max(0, Math.min(start ?? 0, editor.value.length));
  const eRaw = Math.max(s, Math.min(end ?? s, editor.value.length));
  const e = eRaw > s ? eRaw : Math.min(editor.value.length, s + 1);
  editor.focus();
  editor.classList.add('range-active');
  editor.setSelectionRange(s, e);
  scrollEditorToOffset(s);
}

  return {
    mark() {
      return { start: cursor, end: cursor };
    },
    locate(fragment) {
      if (!fragment) return { start: cursor, end: cursor };
      let idx = source.indexOf(fragment, cursor);
      if (idx === -1) idx = source.indexOf(fragment);
      if (idx === -1) return { start: cursor, end: cursor };
      cursor = idx + fragment.length;
      return { start: idx, end: cursor };
    },
    getCursor() {
      return cursor;
    },
  };
}

function createPerfTracker() {
  const t0 = performance.now();
  let firstTokenAt = null;
  let lastTokenAt = null;
  let tokenCount = 0;
  let tickTotal = 0;

  return {
    onToken(token = '') {
      const now = performance.now();
      if (firstTokenAt === null) firstTokenAt = now;
      if (lastTokenAt !== null) tickTotal += (now - lastTokenAt);
      lastTokenAt = now;
      tokenCount += 1;
    },
    snapshot() {
      const now = performance.now();
      const elapsed = now - t0;
      const tokenWindow = firstTokenAt === null ? 0 : (now - firstTokenAt);
      const tps = tokenWindow > 0 ? (tokenCount / (tokenWindow / 1000)) : 0;
      const tickAvg = tokenCount > 1 ? (tickTotal / (tokenCount - 1)) : 0;
      return {
        elapsedMs: Math.round(elapsed),
        tokens: tokenCount,
        ttftMs: firstTokenAt === null ? null : Math.round(firstTokenAt - t0),
        tps,
        tickAvgMs: tickAvg,
      };
    },
  };
}

function applyPerfSnapshot(perf) {
  statTokens = perf.tokens;
  statTTFT = perf.ttftMs == null ? '-' : `${perf.ttftMs}ms`;
  statTPS = perf.tokens < 1 ? '-' : perf.tps.toFixed(2);
  statTick = perf.tokens < 2 ? '-' : `${perf.tickAvgMs.toFixed(1)}ms`;
}

function formatPerfSummary(perf) {
  const ttft = perf.ttftMs == null ? '-' : `${perf.ttftMs}ms`;
  const tps = perf.tokens < 1 ? '-' : perf.tps.toFixed(2);
  const tick = perf.tokens < 2 ? '-' : `${perf.tickAvgMs.toFixed(1)}ms`;
  return t('perf_summary', {
    tokens: perf.tokens,
    ttft,
    tps,
    tick,
    total: perf.elapsedMs,
  });
}

function eventSignature(kind, typeNum, attrs = '') {
  return `${kind}|${typeNum}|${attrs}`;
}

function collectEventTrace(markdown, chunks = null) {
  const trace = [];
  const parser = new DemoParser({
    onNodeOpen(type, node) {
      trace.push(eventSignature('open', type, nodeAttrs(type, node)));
    },
    onNodeClose(type) {
      trace.push(eventSignature('close', type));
    },
    onText(text) {
      trace.push(eventSignature('text', NodeType.TEXT, text));
    },
    onModify(type, node) {
      trace.push(eventSignature('modify', type, nodeAttrs(type, node)));
    },
  });
  if (Array.isArray(chunks)) chunks.forEach((chunk) => parser.feed(chunk));
  else parser.feed(markdown);
  parser.finish();
  return trace;
}

function diffEventTraces(expected, actual) {
  const minLen = Math.min(expected.length, actual.length);
  for (let i = 0; i < minLen; i++) {
    if (expected[i] !== actual[i]) {
      return { ok: false, index: i, expected: expected[i], actual: actual[i] };
    }
  }
  if (expected.length !== actual.length) {
    return {
      ok: false,
      index: minLen,
      expected: expected[minLen] ?? '<EOF>',
      actual: actual[minLen] ?? '<EOF>',
    };
  }
  return { ok: true };
}

function createFaultState() {
  return { triggered: false, mode: null, detail: '' };
}

function markFault(faultState, mode, detail) {
  if (!faultState) return;
  if (faultState.triggered) return;
  faultState.triggered = true;
  faultState.mode = mode;
  faultState.detail = detail || '';
}

function formatErrorLabel(err, faultState = null) {
  if (faultState?.triggered) {
    return t('err_injected_fault', {
      mode: faultState.mode,
      detail: faultState.detail || err?.message || String(err),
    });
  }
  if (err?.isInjectedFault) {
    return t('err_injected_fault_simple', { detail: err?.message || String(err) });
  }
  return t('err_provider', { detail: err?.message || String(err) });
}

function summarizeTextDiff(aText, bText) {
  if (aText === bText) return t('diff_ab_identical');
  const a = aText || '';
  const b = bText || '';
  const min = Math.min(a.length, b.length);
  let i = 0;
  while (i < min && a[i] === b[i]) i++;
  const aSlice = a.slice(i, i + 60).replace(/\n/g, '↵');
  const bSlice = b.slice(i, i + 60).replace(/\n/g, '↵');
  return t('diff_ab_summary', {
    offset: i,
    aLen: a.length,
    bLen: b.length,
    aSnippet: `${aSlice}${a.length > i + 60 ? '…' : ''}`,
    bSnippet: `${bSlice}${b.length > i + 60 ? '…' : ''}`,
  });
}

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

function addEvent(kind, typeNum, attrs = '', range = null) {
  statEvents++;
  evIdx++;
  const typeName = TYPE_NAME[typeNum] ?? String(typeNum);
  const el = document.createElement('div');
  el.className = 'ev';
  if (range) {
    el.dataset.start = String(range.start ?? 0);
    el.dataset.end = String(range.end ?? range.start ?? 0);
    el.addEventListener('click', () => {
      selectEventElement(el);
      const start = parseInt(el.dataset.start, 10) || 0;
      const end = parseInt(el.dataset.end, 10) || start;
      highlightSourceRange(start, end);
    });
  }
  el.innerHTML =
    `<span class="ev-idx">${evIdx}</span>` +
    `<span class="ev-kind ${kind}">${kind.toUpperCase()}</span>` +
    `<span class="ev-type">${typeName}</span>` +
    (attrs ? `<span class="ev-attr"> ${attrs}</span>` : '');
  evStream.appendChild(el);
  evStream.scrollTop = evStream.scrollHeight;
}

function clearEvents() {
  evStream.innerHTML = '';
  evIdx = 0;
  clearSelectionHighlights();
}

clearEvtBtn.addEventListener('click', clearEvents);

// ── AST builder ───────────────────────────────────────────────────────────────
function buildAST(markdown) {
  const rangeTracker = makeRangeTracker(markdown);
  const root = { type: NodeType.DOCUMENT, children: [], text: '', rangeStart: 0, rangeEnd: 0 };
  const stack = [root];

  const demoParser = new DemoParser({
    onNodeOpen(type, node) {
      const mark = rangeTracker.mark();
      const n = { type, ...node, children: [], text: '', rangeStart: mark.start, rangeEnd: mark.end };
      stack[stack.length - 1].children.push(n);
      stack.push(n);
    },
    onNodeClose() {
      if (stack.length <= 1) return;
      const closing = stack.pop();
      const mark = rangeTracker.mark();
      closing.rangeEnd = Math.max(closing.rangeEnd ?? mark.end, mark.end);
    },
    onText(text)  {
      const top = stack[stack.length - 1];
      top.text += text;
      const located = rangeTracker.locate(text);
      stack.forEach((n) => {
        n.rangeStart = Math.min(n.rangeStart ?? located.start, located.start);
        n.rangeEnd = Math.max(n.rangeEnd ?? located.end, located.end);
      });
    },
    onModify(type, node) {
      const top = stack[stack.length - 1];
      Object.assign(top, { type, ...node });
    },
  });
  demoParser.feed(markdown);
  demoParser.finish();

  return root;
}

function renderAST(node, depth = 0) {
  const name = TYPE_NAME[node.type] ?? String(node.type);
  const cls  = TYPE_CLASS(node.type);
  const el   = document.createElement('div');
  el.className = 'tree-node';

  // Build label
  let attrs = '';
  if (node.level)    attrs += ` h${node.level}`;
  if (node.lang)     attrs += ` lang="${node.lang}"`;
  if (node.href)     attrs += ` href="${node.href}"`;
  if (node.src)      attrs += ` src="${node.src}"`;
  if (node.ordered !== undefined) attrs += node.ordered ? ' ordered' : ' unordered';
  if (node.colCount) attrs += ` cols=${node.colCount}`;

  const textPreview = node.text ? ` "${node.text.slice(0,40).replace(/\n/g,'↵')}"` : '';

  el.innerHTML =
    `<div class="tree-node-label">` +
    `<span class="tn-type k-${cls}">${name}</span>` +
    (attrs ? `<span class="tn-attr">${attrs}</span>` : '') +
    (textPreview ? `<span class="tn-text">${textPreview}</span>` : '') +
    `</div>`;

  const label = el.querySelector('.tree-node-label');
  if (label) {
    label.dataset.start = String(node.rangeStart ?? 0);
    label.dataset.end = String(node.rangeEnd ?? node.rangeStart ?? 0);
    label.addEventListener('click', () => {
      selectAstElement(label);
      const start = parseInt(label.dataset.start, 10) || 0;
      const end = parseInt(label.dataset.end, 10) || start;
      highlightSourceRange(start, end);
    });
  }

  if (node.children?.length) {
    const childWrap = document.createElement('div');
    node.children.forEach(c => childWrap.appendChild(renderAST(c, depth + 1)));
    el.appendChild(childWrap);
  }
  return el;
}

// ── HTML preview renderer (basic, no dependency) ──────────────────────────────
function renderHTMLPreview(markdown) {
  // Render via a DemoParser that builds minimal HTML
  const htmlChunks = [];
  const stack = [];

  const openTag = (tag, attrs='') =>
    htmlChunks.push(`<${tag}${attrs ? ' ' + attrs : ''}>`);
  const closeTag = (tag) =>
    htmlChunks.push(`</${tag}>`);
  const escHTML = (s) =>
    s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sanitizeHTML = (raw) => {
    const tpl = document.createElement('template');
    tpl.innerHTML = raw;

    const blockedTags = new Set(['script', 'iframe', 'object', 'embed', 'link', 'meta']);
    const nodes = tpl.content.querySelectorAll('*');
    for (const el of nodes) {
      const tag = el.tagName.toLowerCase();
      if (blockedTags.has(tag)) { el.remove(); continue; }
      for (const attr of [...el.attributes]) {
        const name = attr.name.toLowerCase();
        const value = attr.value.trim().toLowerCase();
        if (name.startsWith('on')) {
          el.removeAttribute(attr.name);
          continue;
        }
        if ((name === 'href' || name === 'src' || name === 'xlink:href') && value.startsWith('javascript:')) {
          el.removeAttribute(attr.name);
        }
      }
    }
    return tpl.innerHTML;
  };

  const BLOCK_TAG = {
    [NodeType.DOCUMENT]:    ['div', ''],
    [NodeType.HEADING]:     (n) => [`h${n.level||1}`, ''],
    [NodeType.PARAGRAPH]:   ['p',  ''],
    [NodeType.CODE_BLOCK]:  ['pre',''],
    [NodeType.BLOCK_QUOTE]: ['blockquote', ''],
    [NodeType.LIST]:        (n) => [n.ordered ? 'ol' : 'ul', n.ordered && n.start!==1 ? `start="${n.start}"` : ''],
    [NodeType.LIST_ITEM]:   ['li', ''],
    [NodeType.TASK_LIST_ITEM]: ['li', ''],
    [NodeType.THEMATIC_BREAK]: null,
    [NodeType.HTML_BLOCK]:  null,
    [NodeType.TABLE]:       ['table', ''],
    [NodeType.TABLE_HEAD]:  ['thead', ''],
    [NodeType.TABLE_ROW]:   ['tr', ''],
    [NodeType.TABLE_CELL]:  (n) => ['td', n.align && n.align!=='none' ? `style="text-align:${n.align}"` : ''],
    [NodeType.EMPHASIS]:    ['em',  ''],
    [NodeType.STRONG]:      ['strong', ''],
    [NodeType.STRIKETHROUGH]:['del',''],
    [NodeType.INLINE_CODE]: ['code', ''],
    [NodeType.LINK]:        (n) => ['a', `href="${escHTML(n.href||'')}"`],
    [NodeType.IMAGE]:       null,
    [NodeType.AUTO_LINK]:   (n) => ['a', `href="${escHTML(n.url||'')}"`],
    [NodeType.HTML_INLINE]: null,
    [NodeType.TEXT]:        null,
    [NodeType.SOFT_BREAK]:  null,
    [NodeType.HARD_BREAK]:  null,
  };

  const dp = new DemoParser({
    onNodeOpen(type, node) {
      if (type === NodeType.THEMATIC_BREAK) { htmlChunks.push('<hr>'); stack.push(null); return; }
      if (type === NodeType.IMAGE) {
        htmlChunks.push(`<img src="${escHTML(node.src||'')}" alt="${escHTML(node.alt||'')}">`);
        stack.push(null); return;
      }
      if (type === NodeType.HTML_BLOCK || type === NodeType.HTML_INLINE) {
        stack.push('html_raw'); return;
      }
      if (type === NodeType.SOFT_BREAK) { htmlChunks.push(' '); stack.push(null); return; }
      if (type === NodeType.HARD_BREAK) { htmlChunks.push('<br>'); stack.push(null); return; }
      if (type === NodeType.TEXT) { stack.push(null); return; }
      if (type === NodeType.TASK_LIST_ITEM) {
        htmlChunks.push(`<li><input type="checkbox"${node.checked?' checked':''} disabled> `);
        stack.push('li'); return;
      }
      if (type === NodeType.CODE_BLOCK) {
        htmlChunks.push(`<pre><code${node.lang?` class="language-${escHTML(node.lang)}"`:''}}>`);
        stack.push('code_block'); return;
      }

      const spec = BLOCK_TAG[type];
      if (!spec) { stack.push(null); return; }
      const [tag, attrs] = typeof spec === 'function' ? spec(node) : spec;
      openTag(tag, attrs);
      stack.push(tag);
    },
    onNodeClose(type) {
      const tag = stack.pop();
      if (!tag) return;
      if (tag === 'code_block') { htmlChunks.push('</code></pre>'); return; }
      if (tag === 'html_raw') return;
      if (tag === 'div') return; // document wrapper
      closeTag(tag);
    },
    onText(text) {
      const top = stack[stack.length - 1];
      if (top === 'code_block') { htmlChunks.push(escHTML(text)); return; }
      if (top === 'html_raw')   { htmlChunks.push(sanitizeHTML(text)); return; }
      htmlChunks.push(escHTML(text));
    },
    onModify(type, node) {
      // table/heading promotion: just update the top stack tag
    },
  });
  dp.feed(markdown);
  dp.finish();

  // strip outer <div></div>
  let html = htmlChunks.join('');
  html = html.replace(/^<div>/, '').replace(/<\/div>$/, '');
  return html;
}

// ── DemoParser — pure-JS fallback (no WASM required for demo) ─────────────────
//
// Line-buffered: events fire as soon as a complete "paragraph boundary" is
// seen, so streaming mode can update the preview incrementally.
//
// Replace `new DemoParser(...)` with `new WasmMkParser(Module, ...)` once
// the WASM build is available.

class DemoParser {
  #cb;
  #lineBuf  = '';   // partial last line waiting for '\n'
  #pending  = [];   // complete lines not yet parsed

  constructor(callbacks = {}) { this.#cb = callbacks; }

  feed(chunk) {
    // Append chunk, split on newlines, keep partial last line in buffer
    const raw = this.#lineBuf + chunk;
    const nl  = raw.lastIndexOf('\n');
    if (nl >= 0) {
      const complete = raw.slice(0, nl + 1);
      this.#lineBuf  = raw.slice(nl + 1);
      this.#pending.push(...complete.split('\n').map(l => l + '\n')
                         .flatMap(l => l === '\n' ? [''] : [l.slice(0, -1)]));
    } else {
      this.#lineBuf = raw;
    }
    return this;
  }

  finish() {
    // Flush remaining buffer as a final line
    if (this.#lineBuf) {
      this.#pending.push(this.#lineBuf);
      this.#lineBuf = '';
    }
    this.#cb.onNodeOpen?.(NodeType.DOCUMENT, { type: NodeType.DOCUMENT, flags: 0 });
    this.#parseBlocks(this.#pending, 0, this.#pending.length);
    this.#cb.onNodeClose?.(NodeType.DOCUMENT, { type: NodeType.DOCUMENT, flags: 0 });
    this.#pending = [];
    return this;
  }

  destroy() {}

  #parseBlocks(lines, start, end) {
    let i = start;
    while (i < end) {
      // Skip blank lines
      if (lines[i].trim() === '') { i++; continue; }

      // ATX Heading
      const hm = lines[i].match(/^(#{1,6})\s+(.*?)(?:\s+#+\s*)?$/);
      if (hm) {
        const level = hm[1].length;
        const node = { type: NodeType.HEADING, flags: 0, level };
        this.#cb.onNodeOpen?.(NodeType.HEADING, node);
        this.#parseInline(hm[2]);
        this.#cb.onNodeClose?.(NodeType.HEADING, node);
        i++; continue;
      }

      // Thematic break
      if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(lines[i])) {
        this.#cb.onNodeOpen?.(NodeType.THEMATIC_BREAK, { type: NodeType.THEMATIC_BREAK, flags: 0 });
        this.#cb.onNodeClose?.(NodeType.THEMATIC_BREAK, { type: NodeType.THEMATIC_BREAK, flags: 0 });
        i++; continue;
      }

      // Fenced code block
      const fm = lines[i].match(/^(`{3,}|~{3,})\s*(\S*)/);
      if (fm) {
        const fence = fm[1], lang = fm[2] || null;
        const node = { type: NodeType.CODE_BLOCK, flags: 0, lang, fenced: true };
        this.#cb.onNodeOpen?.(NodeType.CODE_BLOCK, node);
        i++;
        while (i < end && !lines[i].startsWith(fence)) {
          this.#cb.onText?.(lines[i] + '\n');
          statChars += lines[i].length + 1;
          i++;
        }
        this.#cb.onNodeClose?.(NodeType.CODE_BLOCK, node);
        i++; continue;
      }

      // Blockquote
      if (lines[i].startsWith('>')) {
        const bqLines = [];
        while (i < end && (lines[i].startsWith('>') || lines[i].trim())) {
          bqLines.push(lines[i].replace(/^>\s?/, ''));
          i++;
        }
        const node = { type: NodeType.BLOCK_QUOTE, flags: 0 };
        this.#cb.onNodeOpen?.(NodeType.BLOCK_QUOTE, node);
        this.#parseBlocks(bqLines, 0, bqLines.length);
        this.#cb.onNodeClose?.(NodeType.BLOCK_QUOTE, node);
        continue;
      }

      // Unordered list
      if (/^[-*+]\s/.test(lines[i])) {
        const node = { type: NodeType.LIST, flags: 0, ordered: false, start: 1 };
        this.#cb.onNodeOpen?.(NodeType.LIST, node);
        while (i < end && /^[-*+]\s/.test(lines[i])) {
          const content = lines[i].slice(2);
          const isTask = content.match(/^\[(x| )\]\s(.*)/);
          if (isTask) {
            const checked = isTask[1] === 'x';
            const tnode = { type: NodeType.TASK_LIST_ITEM, flags: 0, checked };
            this.#cb.onNodeOpen?.(NodeType.TASK_LIST_ITEM, tnode);
            this.#parseInline(isTask[2]);
            this.#cb.onNodeClose?.(NodeType.TASK_LIST_ITEM, tnode);
          } else {
            const linode = { type: NodeType.LIST_ITEM, flags: 0 };
            this.#cb.onNodeOpen?.(NodeType.LIST_ITEM, linode);
            this.#parseInline(content);
            this.#cb.onNodeClose?.(NodeType.LIST_ITEM, linode);
          }
          i++;
        }
        this.#cb.onNodeClose?.(NodeType.LIST, node);
        continue;
      }

      // Ordered list
      if (/^\d+[.)]\s/.test(lines[i])) {
        const startNum = parseInt(lines[i]);
        const node = { type: NodeType.LIST, flags: 0, ordered: true, start: startNum };
        this.#cb.onNodeOpen?.(NodeType.LIST, node);
        while (i < end && /^\d+[.)]\s/.test(lines[i])) {
          const content = lines[i].replace(/^\d+[.)]\s/, '');
          const linode = { type: NodeType.LIST_ITEM, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.LIST_ITEM, linode);
          this.#parseInline(content);
          this.#cb.onNodeClose?.(NodeType.LIST_ITEM, linode);
          i++;
        }
        this.#cb.onNodeClose?.(NodeType.LIST, node);
        continue;
      }

      // Table (simplified: detect separator row)
      const tableRows = [];
      let j = i;
      while (j < end && lines[j].includes('|')) tableRows.push(lines[j++]);
      if (tableRows.length >= 2 && /^\|?[\s\-:]+\|/.test(tableRows[1])) {
        const colAligns = tableRows[1].split('|').slice(1,-1).map(c => {
          c = c.trim();
          if (c.startsWith(':') && c.endsWith(':')) return 'center';
          if (c.endsWith(':')) return 'right';
          if (c.startsWith(':')) return 'left';
          return 'none';
        });
        const tnode = { type: NodeType.TABLE, flags: 0, colCount: colAligns.length, colAligns };
        this.#cb.onNodeOpen?.(NodeType.TABLE, tnode);
        // Header
        const thead = { type: NodeType.TABLE_HEAD, flags: 0 };
        this.#cb.onNodeOpen?.(NodeType.TABLE_HEAD, thead);
        this.#emitTableRow(tableRows[0], colAligns, true);
        this.#cb.onNodeClose?.(NodeType.TABLE_HEAD, thead);
        // Body rows
        for (let r = 2; r < tableRows.length; r++)
          this.#emitTableRow(tableRows[r], colAligns, false);
        this.#cb.onNodeClose?.(NodeType.TABLE, tnode);
        i = j; continue;
      }

      // HTML block
      if (lines[i].trimStart().startsWith('<') && !lines[i].trimStart().startsWith('</')) {
        const raw = lines[i];
        const node = { type: NodeType.HTML_BLOCK, flags: 0, raw };
        this.#cb.onNodeOpen?.(NodeType.HTML_BLOCK, node);
        this.#cb.onText?.(raw);
        this.#cb.onNodeClose?.(NodeType.HTML_BLOCK, node);
        i++; continue;
      }

      // Paragraph: collect until blank line
      const paraLines = [];
      while (i < end && lines[i].trim() !== '' &&
             !/^#{1,6}\s/.test(lines[i]) &&
             !/^[-*+]\s/.test(lines[i]) &&
             !/^\d+[.)]\s/.test(lines[i]) &&
             !/^(`{3,}|~{3,})/.test(lines[i]) &&
             !/^>/.test(lines[i])) {
        paraLines.push(lines[i]);
        i++;
      }
      if (paraLines.length) {
        // Setext heading check
        if (paraLines.length >= 2 && /^=+$/.test(paraLines[paraLines.length-1])) {
          const node = { type: NodeType.HEADING, flags: 0, level: 1 };
          this.#cb.onNodeOpen?.(NodeType.HEADING, node);
          this.#parseInline(paraLines.slice(0,-1).join('\n'));
          this.#cb.onNodeClose?.(NodeType.HEADING, node);
        } else if (paraLines.length >= 2 && /^-+$/.test(paraLines[paraLines.length-1])) {
          const node = { type: NodeType.HEADING, flags: 0, level: 2 };
          this.#cb.onNodeOpen?.(NodeType.HEADING, node);
          this.#parseInline(paraLines.slice(0,-1).join('\n'));
          this.#cb.onNodeClose?.(NodeType.HEADING, node);
        } else {
          const node = { type: NodeType.PARAGRAPH, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.PARAGRAPH, node);
          this.#parseInline(paraLines.join('\n'));
          this.#cb.onNodeClose?.(NodeType.PARAGRAPH, node);
        }
      }
    }
  }

  #emitTableRow(line, colAligns, isHead) {
    const cells = line.split('|').slice(1, -1);
    const rnode = { type: NodeType.TABLE_ROW, flags: 0 };
    this.#cb.onNodeOpen?.(NodeType.TABLE_ROW, rnode);
    cells.forEach((cell, idx) => {
      const cnode = { type: NodeType.TABLE_CELL, flags: 0, align: colAligns[idx] ?? 'none', colIndex: idx };
      this.#cb.onNodeOpen?.(NodeType.TABLE_CELL, cnode);
      this.#parseInline(cell.trim());
      this.#cb.onNodeClose?.(NodeType.TABLE_CELL, cnode);
    });
    this.#cb.onNodeClose?.(NodeType.TABLE_ROW, rnode);
  }

  #parseInline(text) {
    // Simple regex-based inline parser
    let i = 0;
    const len = text.length;
    const isAutoLink = (inner) =>
      /^(https?:\/\/|mailto:|ftp:\/\/)/i.test(inner) ||
      /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(inner);

    const flush = (s) => {
      if (!s) return;
      const node = { type: NodeType.TEXT, flags: 0 };
      this.#cb.onNodeOpen?.(NodeType.TEXT, node);
      this.#cb.onText?.(s);
      statChars += s.length;
      this.#cb.onNodeClose?.(NodeType.TEXT, node);
    };

    let buf = '';
    while (i < len) {
      // Hard break: "  \n"
      if (text[i] === '\n') {
        if (buf.endsWith('  ')) {
          flush(buf.slice(0, -2));
          buf = '';
          this.#cb.onNodeOpen?.(NodeType.HARD_BREAK, { type: NodeType.HARD_BREAK, flags: 0 });
          this.#cb.onNodeClose?.(NodeType.HARD_BREAK, { type: NodeType.HARD_BREAK, flags: 0 });
        } else {
          flush(buf); buf = '';
          this.#cb.onNodeOpen?.(NodeType.SOFT_BREAK, { type: NodeType.SOFT_BREAK, flags: 0 });
          this.#cb.onNodeClose?.(NodeType.SOFT_BREAK, { type: NodeType.SOFT_BREAK, flags: 0 });
        }
        i++; continue;
      }

      // Autolink <...>
      if (text[i] === '<') {
        const end = text.indexOf('>', i+1);
        if (end !== -1) {
          const inner = text.slice(i+1, end);
          flush(buf); buf = '';
          if (isAutoLink(inner)) {
            const isEmail = /^[A-Za-z0-9._%+-]+@/.test(inner);
            const node = { type: NodeType.AUTO_LINK, flags: 0, url: inner, isEmail };
            this.#cb.onNodeOpen?.(NodeType.AUTO_LINK, node);
            this.#cb.onText?.(inner);
            this.#cb.onNodeClose?.(NodeType.AUTO_LINK, node);
          } else {
            const raw = text.slice(i, end + 1);
            const node = { type: NodeType.HTML_INLINE, flags: 0, raw };
            this.#cb.onNodeOpen?.(NodeType.HTML_INLINE, node);
            this.#cb.onText?.(raw);
            this.#cb.onNodeClose?.(NodeType.HTML_INLINE, node);
          }
          i = end + 1; continue;
        }
      }

      // Image ![alt](src)
      if (text[i] === '!' && text[i+1] === '[') {
        const cb = text.indexOf(']', i+2);
        if (cb !== -1 && text[cb+1] === '(') {
          const pe = text.indexOf(')', cb+2);
          if (pe !== -1) {
            flush(buf); buf = '';
            const alt = text.slice(i+2, cb);
            const href = text.slice(cb+2, pe);
            const [src, title] = href.split(/ "(.*)"/);
            const node = { type: NodeType.IMAGE, flags: 0, src: src.trim(), alt, title: title || null };
            this.#cb.onNodeOpen?.(NodeType.IMAGE, node);
            this.#cb.onNodeClose?.(NodeType.IMAGE, node);
            i = pe + 1; continue;
          }
        }
      }

      // Link [text](href)
      if (text[i] === '[') {
        const cb = text.indexOf(']', i+1);
        if (cb !== -1 && text[cb+1] === '(') {
          const pe = text.indexOf(')', cb+2);
          if (pe !== -1) {
            flush(buf); buf = '';
            const inner = text.slice(i+1, cb);
            const rawHref = text.slice(cb+2, pe);
            const m = rawHref.match(/^(\S+)\s+"(.*)"$/);
            const href = m ? m[1] : rawHref;
            const title = m ? m[2] : null;
            const node = { type: NodeType.LINK, flags: 0, href, title };
            this.#cb.onNodeOpen?.(NodeType.LINK, node);
            this.#parseInline(inner);
            this.#cb.onNodeClose?.(NodeType.LINK, node);
            i = pe + 1; continue;
          }
        }
      }

      // Inline code `...`
      if (text[i] === '`') {
        const end = text.indexOf('`', i+1);
        if (end !== -1) {
          flush(buf); buf = '';
          const code = text.slice(i+1, end);
          const node = { type: NodeType.INLINE_CODE, flags: 0, text: code };
          this.#cb.onNodeOpen?.(NodeType.INLINE_CODE, node);
          this.#cb.onText?.(code);
          this.#cb.onNodeClose?.(NodeType.INLINE_CODE, node);
          i = end + 1; continue;
        }
      }

      // Bold+italic ***
      if (text.startsWith('***', i)) {
        const end = text.indexOf('***', i+3);
        if (end !== -1) {
          flush(buf); buf = '';
          const sn = { type: NodeType.STRONG, flags: 0 };
          const en = { type: NodeType.EMPHASIS, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.STRONG, sn);
          this.#cb.onNodeOpen?.(NodeType.EMPHASIS, en);
          this.#parseInline(text.slice(i+3, end));
          this.#cb.onNodeClose?.(NodeType.EMPHASIS, en);
          this.#cb.onNodeClose?.(NodeType.STRONG, sn);
          i = end + 3; continue;
        }
      }

      // Bold ** or __
      const boldMatch = text.startsWith('**', i) ? '**' : text.startsWith('__', i) ? '__' : null;
      if (boldMatch) {
        const end = text.indexOf(boldMatch, i+2);
        if (end !== -1) {
          flush(buf); buf = '';
          const node = { type: NodeType.STRONG, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.STRONG, node);
          this.#parseInline(text.slice(i+2, end));
          this.#cb.onNodeClose?.(NodeType.STRONG, node);
          i = end + 2; continue;
        }
      }

      // Strikethrough ~~
      if (text.startsWith('~~', i)) {
        const end = text.indexOf('~~', i+2);
        if (end !== -1) {
          flush(buf); buf = '';
          const node = { type: NodeType.STRIKETHROUGH, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.STRIKETHROUGH, node);
          this.#parseInline(text.slice(i+2, end));
          this.#cb.onNodeClose?.(NodeType.STRIKETHROUGH, node);
          i = end + 2; continue;
        }
      }

      // Italic * or _
      const emMatch = (text[i] === '*' && text[i+1] !== '*') ? '*'
                    : (text[i] === '_' && text[i+1] !== '_') ? '_' : null;
      if (emMatch) {
        const end = text.indexOf(emMatch, i+1);
        if (end !== -1 && end > i+1) {
          flush(buf); buf = '';
          const node = { type: NodeType.EMPHASIS, flags: 0 };
          this.#cb.onNodeOpen?.(NodeType.EMPHASIS, node);
          this.#parseInline(text.slice(i+1, end));
          this.#cb.onNodeClose?.(NodeType.EMPHASIS, node);
          i = end + 1; continue;
        }
      }

      buf += text[i++];
    }
    flush(buf);
  }
}

// ── Core actions ──────────────────────────────────────────────────────────────
function runParse() {
  const md = editor.value;
  clearEvents();
  astTree.innerHTML  = '';
  preview.innerHTML  = '';
  setCompareMode(false);
  resetStats();
  editor.classList.remove('range-active');

  const t0 = performance.now();
  const rangeTracker = makeRangeTracker(md);
  const callbacks = {
    onNodeOpen(type, node) {
      statNodes++;
      const attrStr = nodeAttrs(type, node);
      addEvent('open', type, attrStr, rangeTracker.mark());
      updateStats();
    },
    onNodeClose(type) {
      addEvent('close', type, '', rangeTracker.mark());
      updateStats();
    },
    onText(text) {
      statChars += text.length;
      const display = text.slice(0, 40).replace(/\n/g, '↵');
      addEvent('text', NodeType.TEXT, `"${display}${text.length > 40 ? '…' : ''}"`, rangeTracker.locate(text));
      updateStats();
    },
    onModify(type, node) {
      addEvent('modify', type, nodeAttrs(type, node), rangeTracker.mark());
      updateStats();
    },
  };

  const p = new DemoParser(callbacks);
  p.feed(md).finish();

  statTime = Math.round(performance.now() - t0);
  updateStats();

  // AST tab
  const ast = buildAST(md);
  astTree.appendChild(renderAST(ast));

  // Preview tab
  preview.innerHTML = renderHTMLPreview(md);
}

function nodeAttrs(type, node) {
  const parts = [];
  if (node.level)                       parts.push(`level=${node.level}`);
  if (node.lang)                        parts.push(`lang="${node.lang}"`);
  if (node.fenced !== undefined)        parts.push(`fenced=${node.fenced}`);
  if (node.ordered !== undefined)       parts.push(node.ordered ? 'ordered' : 'unordered');
  if (node.href)                        parts.push(`href="${node.href}"`);
  if (node.src)                         parts.push(`src="${node.src}"`);
  if (node.url)                         parts.push(`url="${node.url}"`);
  if (node.colCount !== undefined)      parts.push(`cols=${node.colCount}`);
  if (node.align && node.align!=='none') parts.push(`align=${node.align}`);
  if (node.checked !== undefined)       parts.push(`checked=${node.checked}`);
  if (node.isEmail !== undefined)       parts.push(`isEmail=${node.isEmail}`);
  return parts.join(' ');
}

// ── Live preview helper ───────────────────────────────────────────────────────
// Wraps the preview container; `render(text)` re-renders partial markdown
// and appends a blinking cursor to signal ongoing streaming.

function makeLivePreview(container) {
  let streaming = true;

  return {
    render(text) {
      const html = renderHTMLPreview(text);
      container.innerHTML = html + (streaming
        ? '<span class="stream-cursor"></span>'
        : '');
    },
    stop() {
      streaming = false;
      // Remove cursor from whatever is currently shown
      const cur = container.querySelector('.stream-cursor');
      if (cur) cur.remove();
    },
  };
}

function renderTick(text, livePreview, streaming) {
  const evScrollBottom =
    evStream.scrollHeight - evStream.scrollTop - evStream.clientHeight < 40;
  evIdx = 0;
  evStream.innerHTML = '';
  statEvents = statNodes = statChars = 0;
  const rangeTracker = makeRangeTracker(text);

  const tickP = new DemoParser({
    onNodeOpen(type, node) {
      statNodes++;
      addEvent('open', type, nodeAttrs(type, node), rangeTracker.mark());
    },
    onNodeClose(type) {
      addEvent('close', type, '', rangeTracker.mark());
    },
    onText(t) {
      statChars += t.length;
      addEvent('text', NodeType.TEXT, `"${t.slice(0,40).replace(/\n/g,'↵')}${t.length>40?'…':''}"`, rangeTracker.locate(t));
    },
    onModify(type, node) {
      addEvent('modify', type, nodeAttrs(type, node), rangeTracker.mark());
    },
  });
  tickP.feed(text).finish();
  if (evScrollBottom) evStream.scrollTop = evStream.scrollHeight;

  astTree.innerHTML = '';
  astTree.appendChild(renderAST(buildAST(text)));

  if (streaming) livePreview.render(text);
  else {
    livePreview.stop();
    livePreview.render(text);
  }
}

const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

function randomChunkSplit(text, minSize, maxSize) {
  const chunks = [];
  let i = 0;
  while (i < text.length) {
    const size = randInt(minSize, maxSize);
    chunks.push(text.slice(i, i + size));
    i += size;
  }
  return chunks;
}

async function* withFaultInjection(stream, config, baseDelayMs = 0, faultState = null) {
  const mode = config.faultMode || 'none';
  const after = Math.max(1, config.faultAfter || 120);
  const prob = Math.max(0, Math.min(100, config.faultProbability ?? 10)) / 100;
  let idx = 0;
  let injectedInvalid = false;
  for await (const token of stream) {
    idx++;
    if (mode === 'latency') {
      const jitter = randInt(baseDelayMs, baseDelayMs + 120);
      await sleep(jitter);
    }
    if (mode === 'prob_jitter' && Math.random() < prob) {
      const jitter = randInt(baseDelayMs, baseDelayMs + 120);
      markFault(faultState, 'prob_jitter', `jittered ${jitter}ms at token ${idx}`);
      await sleep(jitter);
    }
    if (mode === 'disconnect' && idx >= after) {
      markFault(faultState, 'disconnect', `forced disconnect at token ${idx}`);
      const err = new Error(`disconnect at token ${idx}`);
      err.isInjectedFault = true;
      throw err;
    }
    if (mode === 'prob_disconnect' && Math.random() < prob) {
      markFault(faultState, 'prob_disconnect', `random disconnect at token ${idx}`);
      const err = new Error(`random disconnect at token ${idx}`);
      err.isInjectedFault = true;
      throw err;
    }
    if (mode === 'half_packet' && idx >= after) {
      markFault(faultState, 'half_packet', `forced stream stop at token ${idx}`);
      return;
    }
    if (mode === 'invalid_token' && idx >= after && !injectedInvalid) {
      injectedInvalid = true;
      markFault(faultState, 'invalid_token', `inserted replacement character at token ${idx}`);
      yield '\ufffd';
    }
    if (mode === 'prob_invalid' && Math.random() < prob) {
      markFault(faultState, 'prob_invalid', `inserted replacement character at token ${idx}`);
      yield '\ufffd';
    }
    yield token;
  }
}

async function* mockTokenStream(prompt, delayMs) {
  const promptSection = prompt.trim()
    ? `## Prompt\n\n${prompt.trim()}\n\n`
    : '';
  const response = `${promptSection}${MOCK_MODEL_RESPONSE}`;
  for (const ch of response) {
    yield ch;
    await sleep(delayMs);
  }
}

async function* openAiTokenStream(config, signal) {
  if (!config.baseUrl) throw new Error('Base URL is required for OpenAI-compatible mode.');
  if (!config.model) throw new Error('Model is required for OpenAI-compatible mode.');

  const headers = { 'Content-Type': 'application/json' };
  if (config.apiKey) headers.Authorization = `Bearer ${config.apiKey}`;

  const payload = {
    model: config.model,
    stream: true,
    max_tokens: config.maxTokens,
    messages: [
      ...(config.systemPrompt ? [{ role: 'system', content: config.systemPrompt }] : []),
      { role: 'user', content: config.prompt },
    ],
  };

  const response = await fetch(`${config.baseUrl.replace(/\/+$/,'')}/chat/completions`, {
    method: 'POST',
    headers,
    body: JSON.stringify(payload),
    signal,
  });

  if (!response.ok) {
    const bodyText = await response.text().catch(() => '');
    throw new Error(`HTTP ${response.status}: ${(bodyText || response.statusText || 'request failed').slice(0, 200)}`);
  }
  if (!response.body) throw new Error('Streaming response body is not available.');

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true }).replace(/\r\n/g, '\n');

    while (true) {
      const eventEnd = buffer.indexOf('\n\n');
      if (eventEnd === -1) break;

      const rawEvent = buffer.slice(0, eventEnd);
      buffer = buffer.slice(eventEnd + 2);

      const dataLines = rawEvent
        .split('\n')
        .filter((line) => line.startsWith('data:'))
        .map((line) => line.slice(5).trimStart());
      if (!dataLines.length) continue;

      const payloadText = dataLines.join('\n');
      if (payloadText === '[DONE]') return;

      let msg;
      try {
        msg = JSON.parse(payloadText);
      } catch {
        continue;
      }

      const choice = msg?.choices?.[0];
      const token = choice?.delta?.content;
      if (typeof token === 'string' && token.length) yield token;
      if (choice?.finish_reason) return;
    }
  }
}

// ── Streaming simulation ──────────────────────────────────────────────────────
async function runStream() {
  if (activeTask?.kind === 'stream') { activeTask.cancel(); return; }
  if (activeTask) return;

  clearEvents();
  astTree.innerHTML = '';
  preview.innerHTML = '';
  setCompareMode(false);
  resetStats();

  const md = editor.value;
  const delay = () => parseInt(speedSlider.value);

  let cancelled = false;
  startTask('stream', () => { cancelled = true; });

  // ── live preview renderer ──
  const livePreview = makeLivePreview(preview);

  const CHUNK = 7;
  const t0 = performance.now();
  const perf = createPerfTracker();
  let accumulated = '';

  try {
    for (let i = 0; i < md.length && !cancelled; i += CHUNK) {
      const chunk = md.slice(i, i + CHUNK);
      accumulated += chunk;
      perf.onToken(chunk);
      renderTick(accumulated, livePreview, true);
      statTime = Math.round(performance.now() - t0);
      applyPerfSnapshot(perf.snapshot());
      updateStats();
      await sleep(delay());
    }

    if (!cancelled) {
      // Final pass: ensure the complete document is rendered accurately.
      renderTick(md, livePreview, false);
      statTime = Math.round(performance.now() - t0);
      applyPerfSnapshot(perf.snapshot());
      updateStats();
    }
  } finally {
    livePreview.stop();
    finishTask();
  }
}

function describeTraceDiff(diff) {
  if (diff.ok) return t('diff_none');
  return t('diff_mismatch', {
    index: diff.index,
    expected: diff.expected,
    actual: diff.actual,
  });
}

function setBaselineFromEditor() {
  eventBaselineTrace = collectEventTrace(editor.value);
  setDiffOutput(t('baseline_set', { events: eventBaselineTrace.length }));
}

function diffAgainstBaseline() {
  if (!eventBaselineTrace) {
    setDiffOutput(t('diff_default'), true);
    return;
  }
  const current = collectEventTrace(editor.value);
  const diff = diffEventTraces(eventBaselineTrace, current);
  setDiffOutput(describeTraceDiff(diff), !diff.ok);
}

function exportFuzzReport() {
  if (!lastFuzzReport) {
    setDiffOutput(t('fuzz_report_empty'), true);
    return;
  }
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  downloadJson(`mk-parser-fuzz-${stamp}.json`, lastFuzzReport);
  setDiffOutput(t('fuzz_report_exported', {
    runs: lastFuzzReport.summary?.completedRuns || 0,
  }));
}

function pickFuzzReport() {
  return importedFuzzReport || lastFuzzReport;
}

function validateFuzzReport(data) {
  if (!data || typeof data !== 'object') throw new Error('Invalid JSON object.');
  if (data.kind !== 'mk-parser-fuzz-report') throw new Error('Not a mk-parser fuzz report.');
  if (!Array.isArray(data.runs)) throw new Error('Report has no runs.');
  if (typeof data.inputText !== 'string') throw new Error('Report missing inputText.');
  return data;
}

function importFuzzReportFromText(text) {
  const parsed = JSON.parse(text);
  importedFuzzReport = validateFuzzReport(parsed);
  setDiffOutput(t('fuzz_imported', { runs: importedFuzzReport.runs.length }));
}

function splitByChunkSizes(text, sizes) {
  const chunks = [];
  let offset = 0;
  for (const rawSize of sizes) {
    const size = Math.max(1, Number(rawSize) || 1);
    chunks.push(text.slice(offset, offset + size));
    offset += size;
  }
  if (offset < text.length) chunks.push(text.slice(offset));
  return chunks.filter((c) => c.length > 0);
}

async function runReplayFromReport() {
  if (activeTask?.kind === 'replay') { activeTask.cancel(); return; }
  if (activeTask) return;

  const report = pickFuzzReport();
  if (!report) {
    setDiffOutput(t('replay_no_report'), true);
    return;
  }

  const runNum = Math.max(1, parseInt(replayRunInput.value, 10) || 1);
  const run = report.runs.find((r) => r.run === runNum);
  if (!run) {
    setDiffOutput(t('replay_run_missing', { run: runNum }), true);
    return;
  }
  if (!Array.isArray(run.chunkSizes) || !run.chunkSizes.length) {
    setDiffOutput(t('replay_chunks_missing', { run: runNum }), true);
    return;
  }

  clearEvents();
  astTree.innerHTML = '';
  preview.innerHTML = '';
  setCompareMode(false);
  resetStats();
  switchTab('events');

  editor.value = report.inputText;
  const chunks = splitByChunkSizes(report.inputText, run.chunkSizes);
  const baseline = collectEventTrace(report.inputText);
  const delay = Math.max(0, parseInt(speedSlider.value, 10) || 0);
  const livePreview = makeLivePreview(preview);

  let cancelled = false;
  startTask('replay', () => { cancelled = true; setDiffOutput(t('replay_stopping')); });

  const perf = createPerfTracker();
  const t0 = performance.now();
  let accumulated = '';

  try {
    for (const chunk of chunks) {
      if (cancelled) break;
      accumulated += chunk;
      perf.onToken(chunk);
      renderTick(accumulated, livePreview, true);
      statTime = Math.round(performance.now() - t0);
      applyPerfSnapshot(perf.snapshot());
      updateStats();
      if (delay > 0) await sleep(delay);
    }
    renderTick(accumulated, livePreview, false);
    const replayTrace = collectEventTrace(accumulated);
    const diff = diffEventTraces(baseline, replayTrace);
    const msg = t('replay_summary', {
      run: runNum,
      total: report.runs.length,
      chunks: chunks.length,
      diff: describeTraceDiff(diff),
    });
    setDiffOutput(msg, !diff.ok);
  } finally {
    livePreview.stop();
    finishTask();
  }
}

async function collectTraceByChunks(markdown, chunks, delayMax, isCancelled) {
  const trace = [];
  const parser = new DemoParser({
    onNodeOpen(type, node) {
      trace.push(eventSignature('open', type, nodeAttrs(type, node)));
    },
    onNodeClose(type) {
      trace.push(eventSignature('close', type));
    },
    onText(text) {
      trace.push(eventSignature('text', NodeType.TEXT, text));
    },
    onModify(type, node) {
      trace.push(eventSignature('modify', type, nodeAttrs(type, node)));
    },
  });
  for (const chunk of chunks) {
    if (isCancelled()) break;
    parser.feed(chunk);
    if (delayMax > 0) await sleep(randInt(0, delayMax));
  }
  parser.finish();
  return trace;
}

async function runFuzz() {
  if (activeTask?.kind === 'fuzz') { activeTask.cancel(); return; }
  if (activeTask) return;

  const cfg = readWebModelConfig();
  persistWebModelConfig();
  const runs = cfg.fuzzRuns;
  const minChunk = cfg.fuzzChunkMin;
  const maxChunk = Math.max(minChunk, cfg.fuzzChunkMax);
  const delayMax = cfg.fuzzDelayMax;
  const md = editor.value;

  if (!md.length) {
    setDiffOutput(t('fuzz_editor_empty'), true);
    return;
  }

  clearEvents();
  astTree.innerHTML = '';
  preview.innerHTML = '';
  setCompareMode(false);
  resetStats();
  switchTab('events');

  let cancelled = false;
  startTask('fuzz', () => { cancelled = true; setDiffOutput(t('fuzz_stopping')); });

  const baseline = collectEventTrace(md);
  eventBaselineTrace = baseline;
  let mismatches = 0;
  let firstMismatch = null;
  const report = {
    kind: 'mk-parser-fuzz-report',
    version: 1,
    generatedAt: new Date().toISOString(),
    config: {
      runs,
      chunkMin: minChunk,
      chunkMax: maxChunk,
      delayMax,
    },
    inputText: md,
    inputLength: md.length,
    baselineEventCount: baseline.length,
    baselinePreview: baseline.slice(0, 20),
    runs: [],
    summary: null,
  };

  try {
    for (let i = 0; i < runs && !cancelled; i++) {
      const chunks = randomChunkSplit(md, minChunk, maxChunk);
      const trace = await collectTraceByChunks(md, chunks, delayMax, () => cancelled);
      const diff = diffEventTraces(baseline, trace);
      report.runs.push({
        run: i + 1,
        chunkCount: chunks.length,
        chunkSizes: chunks.map((c) => c.length),
        traceCount: trace.length,
        mismatch: diff.ok ? null : {
          index: diff.index,
          expected: diff.expected,
          actual: diff.actual,
        },
      });
      if (!diff.ok) {
        mismatches += 1;
        if (!firstMismatch) {
          firstMismatch = { run: i + 1, chunks: chunks.length, diff };
        }
      }
      setDiffOutput(
        t('fuzz_progress', {
          run: i + 1,
          runs,
          baseline: baseline.length,
          mismatches,
        }),
        false
      );
    }

    runParse();
    report.summary = {
      cancelled: false,
      completedRuns: report.runs.length,
      mismatches,
      firstMismatchRun: firstMismatch?.run ?? null,
    };
    lastFuzzReport = report;
    if (cancelled) {
      setDiffOutput(t('fuzz_stopped'));
      return;
    }
    if (!firstMismatch) {
      setDiffOutput(t('fuzz_done_ok', { runs, baseline: baseline.length }));
      return;
    }
    setDiffOutput(
      t('fuzz_done_bad', {
        runs,
        mismatches,
        firstRun: firstMismatch.run,
        chunks: firstMismatch.chunks,
        diff: describeTraceDiff(firstMismatch.diff),
      }),
      true
    );
  } finally {
    if (cancelled) {
      report.summary = {
        cancelled: true,
        completedRuns: report.runs.length,
        mismatches,
        firstMismatchRun: firstMismatch?.run ?? null,
      };
      lastFuzzReport = report;
    }
    finishTask();
  }
}

async function runModelStream() {
  if (activeTask?.kind === 'model') { activeTask.cancel(); return; }
  if (activeTask) return;

  clearEvents();
  astTree.innerHTML = '';
  preview.innerHTML = '';
  setCompareMode(false);
  resetStats();
  switchTab('preview');

  let cancelled = false;
  const controller = new AbortController();
  startTask('model', () => {
    cancelled = true;
    controller.abort();
    setModelStatus(t('status_stopping'));
  });

  const cfg = readWebModelConfig();
  persistWebModelConfig();

  if (!cfg.prompt.trim()) {
    setModelStatus(t('status_prompt_empty'), true);
    finishTask();
    return;
  }

  editor.value = '';
  const livePreview = makeLivePreview(preview);
  const t0 = performance.now();
  const perf = createPerfTracker();
  const faultState = createFaultState();
  let accumulated = '';

  try {
    setModelStatus(cfg.provider === 'mock'
      ? t('status_generating_mock')
      : t('status_streaming_from', { baseUrl: cfg.baseUrl, model: cfg.model }));

    const baseStream = cfg.provider === 'mock'
      ? mockTokenStream(cfg.prompt, parseInt(speedSlider.value, 10))
      : openAiTokenStream(cfg, controller.signal);
    const tokenStream = withFaultInjection(baseStream, cfg, parseInt(speedSlider.value, 10), faultState);

    for await (const token of tokenStream) {
      if (cancelled) break;
      accumulated += token;
      perf.onToken(token);
      editor.value = accumulated;
      renderTick(accumulated, livePreview, true);
      statTime = Math.round(performance.now() - t0);
      applyPerfSnapshot(perf.snapshot());
      updateStats();
    }

    renderTick(accumulated, livePreview, false);
    statTime = Math.round(performance.now() - t0);
    const finalPerf = perf.snapshot();
    applyPerfSnapshot(finalPerf);
    updateStats();
    if (cancelled) {
      setModelStatus(t('status_stopped'));
    } else if (faultState.triggered) {
      setModelStatus(
        t('status_injected_fault', {
          mode: faultState.mode,
          detail: faultState.detail,
          perf: formatPerfSummary(finalPerf),
        }),
        false
      );
    } else {
      setModelStatus(t('status_done_with_chars', {
        chars: statChars,
        perf: formatPerfSummary(finalPerf),
      }));
    }
  } catch (err) {
    if (cancelled || err?.name === 'AbortError') {
      setModelStatus(t('status_stopped'));
      return;
    }
    const message = formatErrorLabel(err, faultState);
    setModelStatus(message, !faultState.triggered);
  } finally {
    livePreview.stop();
    finishTask();
  }
}

function updateCompareMetrics(el, perf, state = 'running', err = null) {
  if (state === 'error') {
    el.textContent = t('metric_error', { detail: err?.message || String(err) });
    return;
  }
  if (!perf) {
    el.textContent = t('metrics_idle');
    return;
  }
  const summary = formatPerfSummary(perf.snapshot());
  el.textContent = state === 'done' ? t('metric_done', { summary }) : summary;
}

async function runCompareModels() {
  if (activeTask?.kind === 'compare') { activeTask.cancel(); return; }
  if (activeTask) return;

  clearEvents();
  astTree.innerHTML = '';
  preview.innerHTML = '';
  resetStats();
  setCompareMode(true);
  switchTab('preview');

  const cfgA = readWebModelConfig();
  const cfgB = readWebModelBConfig(cfgA);
  persistWebModelConfig();
  if (!cfgA.prompt.trim()) {
    setModelStatus(t('status_prompt_empty'), true);
    setCompareMode(false);
    return;
  }

  compareLabelA.textContent = `${t('compare_label_a_prefix')} · ${cfgA.provider === 'mock' ? 'mock' : cfgA.model}`;
  compareLabelB.textContent = `${t('compare_label_b_prefix')} · ${cfgB.provider === 'mock' ? 'mock' : cfgB.model}`;
  comparePreviewA.innerHTML = '';
  comparePreviewB.innerHTML = '';
  compareMetricsA.textContent = t('metric_starting');
  compareMetricsB.textContent = t('metric_starting');

  let cancelled = false;
  const controllerA = new AbortController();
  const controllerB = new AbortController();
  startTask('compare', () => {
    cancelled = true;
    controllerA.abort();
    controllerB.abort();
    setModelStatus(t('status_stopping_compare'));
  });

  const runOne = async (cfg, paneEl, metricEl, controller) => {
    const live = makeLivePreview(paneEl);
    const perf = createPerfTracker();
    const faultState = createFaultState();
    let text = '';
    try {
      const baseStream = cfg.provider === 'mock'
        ? mockTokenStream(cfg.prompt, parseInt(speedSlider.value, 10))
        : openAiTokenStream(cfg, controller.signal);
      const stream = withFaultInjection(baseStream, cfg, parseInt(speedSlider.value, 10), faultState);
      for await (const token of stream) {
        if (cancelled) break;
        text += token;
        perf.onToken(token);
        live.render(text);
        updateCompareMetrics(metricEl, perf, 'running');
      }
      live.stop();
      live.render(text);
      if (faultState.triggered) {
        metricEl.textContent = t('metric_fault', {
          mode: faultState.mode,
          summary: formatPerfSummary(perf.snapshot()),
        });
      } else {
        updateCompareMetrics(metricEl, perf, 'done');
      }
      return { text, perf, error: null, faultState };
    } catch (err) {
      live.stop();
      live.render(text);
      metricEl.textContent = formatErrorLabel(err, faultState);
      return { text, perf, error: err, faultState };
    }
  };

  try {
    setModelStatus(t('status_running_compare'));
    const [a, b] = await Promise.all([
      runOne(cfgA, comparePreviewA, compareMetricsA, controllerA),
      runOne(cfgB, comparePreviewB, compareMetricsB, controllerB),
    ]);

    editor.value = a.text || b.text || '';
    const nullPreview = { render() {}, stop() {} };
    renderTick(editor.value, nullPreview, false);

    const perfA = a.perf.snapshot();
    applyPerfSnapshot(perfA);
    statTime = Math.max(perfA.elapsedMs, b.perf.snapshot().elapsedMs);
    updateStats();

    if (cancelled) {
      setModelStatus(t('status_compare_stopped'));
      return;
    }
    if (a.error || b.error) {
      const left = a.error ? `A=${formatErrorLabel(a.error, a.faultState)}` : `A=${t('run_ok')}`;
      const right = b.error ? `B=${formatErrorLabel(b.error, b.faultState)}` : `B=${t('run_ok')}`;
      setModelStatus(t('status_compare_error', { left, right }), true);
      setDiffOutput(t('diff_skipped_on_error'), true);
      return;
    }
    setDiffOutput(summarizeTextDiff(a.text, b.text));
    setModelStatus(t('status_compare_done', {
      a: formatPerfSummary(perfA),
      b: formatPerfSummary(b.perf.snapshot()),
    }));
  } finally {
    finishTask();
  }
}

importFuzzFile.addEventListener('change', async (ev) => {
  const file = ev.target.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    importFuzzReportFromText(text);
  } catch (err) {
    setDiffOutput(t('import_failed', { detail: err?.message || String(err) }), true);
  } finally {
    importFuzzFile.value = '';
  }
});
clearBtn.addEventListener('click', () => {
  editor.value = '';
  evStream.innerHTML = '';
  astTree.innerHTML  = '';
  preview.innerHTML  = '';

  setDiffOutput(t('diff_default'));

});

  providerSelect,

// Auto-parse on edit (debounced)

applyI18n();

});
refreshActionButtons();
setModelStatus(t('status_idle'));
runParse();
